<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Local AI Chat – TinyLlama</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter&family=Playfair+Display&family=Droid+Sans+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{font-family:Inter;background:#111;color:white;margin:0;display:flex;flex-direction:column;height:100vh;}
#status{padding:10px;border-bottom:1px solid #333;}
#chat{flex:1;overflow:auto;padding:20px;}
.user{background:#222;padding:12px;border-radius:10px;margin:10px 0;}
.ai{background:#003b25;padding:12px;border-radius:10px;margin:10px 0;}
h1,h2,h3{font-family:"Playfair Display", serif;}
code{font-family:"Droid Sans Mono",monospace;background:#000;padding:4px;border-radius:6px;}
pre code{display:block;padding:12px;overflow:auto;}
#inputbar{display:flex;border-top:1px solid #333;}
input{flex:1;padding:12px;background:#111;color:white;border:none;font-family:Inter;}
button{padding:12px 20px;background:#00aa55;border:none;color:white;cursor:pointer;}
</style>
</head>

<body>

<div id="status">Modell wird geladen…</div>
<div id="chat"></div>

<div id="inputbar">
  <input id="input" placeholder="Nachricht schreiben...">
  <button onclick="sendMessage()">Senden</button>
</div>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";

// Dein Direct-Link von Google Drive
const MODEL_URL = "https://drive.google.com/uc?export=download&id=1e0oVZFr5DtmO9dOMAgYjREWxoS5qzjx9";

let engine;

async function initAI(){
  document.getElementById("status").textContent="KI lädt… bitte Geduld";

  engine = await webllm.CreateMLCEngine(MODEL_URL);

  document.getElementById("status").textContent="KI bereit!";
}

initAI();

window.sendMessage = async function(){
  const inp=document.getElementById("input");
  if(!inp.value) return;

  addMessage("user", inp.value);

  const reply = await engine.chat.completions.create({
    messages:[{role:"user", content: inp.value}]
  });

  inp.value="";
  addMessage("ai", reply.choices[0].message.content);
}

function addMessage(role,text){
  const div=document.createElement("div");
  div.className=role;
  div.innerHTML=marked.parse(text);
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=document.getElementById("chat").scrollHeight;
}
</script>
</body>
</html>
