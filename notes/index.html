<!doctype html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>aeroNotes — aeroCloud Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Aeropus Sans Web';
            src: url('/AeropusSansWeb.woff2') format('woff2');
            font-weight: normal; font-style: normal;
        }

        :root {
            --bg: #ffffff;
            --sidebar: #f8fafc;
            --text: #1e293b;
            --accent: #0ea5e9;
            --cloud: #10b981;
            --border: #e2e8f0;
            --hover: rgba(14, 165, 233, 0.08);
        }

        body {
            font-family: 'Aeropus Sans Web', sans-serif;
            margin: 0; display: flex; height: 100vh; overflow: hidden;
            background: var(--bg); color: var(--text);
        }

        /* SIDEBAR 2026 Look */
        aside {
            width: 280px; background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 1.5rem;
        }

        .logo { font-family: 'Poppins'; font-weight: 900; font-size: 1.4rem; margin-bottom: 2rem; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .btn-new {
            background: var(--accent); color: white; border: none;
            padding: 0.8rem; border-radius: 14px; font-weight: 700;
            cursor: pointer; margin-bottom: 1.5rem; transition: transform 0.2s;
        }
        .btn-new:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(14,165,233,0.2); }

        .note-list { flex-grow: 1; overflow-y: auto; }
        .note-item {
            padding: 0.75rem 1rem; margin-bottom: 0.4rem; border-radius: 12px;
            cursor: pointer; font-size: 0.9rem; transition: all 0.2s;
            border: 1px solid transparent; display: flex; align-items: center; gap: 8px;
        }
        .note-item:hover { background: var(--hover); color: var(--accent); }
        .note-item.active { background: white; border-color: var(--border); font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }

        /* MAIN AREA */
        main { flex-grow: 1; display: flex; flex-direction: column; position: relative; }

        .toolbar {
            padding: 0.8rem 2rem; background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .tool-group { display: flex; gap: 4px; background: #f1f5f9; padding: 4px; border-radius: 12px; }
        .tool-btn {
            background: transparent; border: none; padding: 6px 12px;
            border-radius: 8px; cursor: pointer; font-weight: 700; font-family: inherit;
            transition: all 0.2s; min-width: 36px;
        }
        .tool-btn:hover { background: white; color: var(--accent); }

        #editor {
            flex-grow: 1; padding: 5rem 15%; outline: none;
            font-size: 1.15rem; line-height: 1.8; overflow-y: auto;
        }

        /* WYSIWYG Styles im Editor */
        #editor h1 { font-family: 'Poppins'; font-size: 2.4rem; margin: 0 0 1rem 0; }
        #editor h2 { font-family: 'Poppins'; font-size: 1.8rem; margin: 1.5rem 0 0.5rem 0; }
        #editor blockquote { border-left: 4px solid var(--accent); margin: 0; padding-left: 1rem; font-style: italic; opacity: 0.8; }
        #editor b { font-weight: 900; }
    </style>
</head>
<body>

<aside>
    <div class="logo">aero<span>Notes</span></div>
    <button class="btn-new" onclick="createNewNote()">+ Neue Notiz</button>
    <div class="note-list" id="note-list"></div>
</aside>

<main>
    <header class="toolbar">
        <input type="text" id="filename" style="border:none; font-weight:900; outline:none; font-size:1.1rem; width: 200px;" value="unbenannt">
        
        <div class="tool-group">
            <button class="tool-btn" onclick="exec('bold')">B</button>
            <button class="tool-btn" onclick="exec('italic')">I</button>
            <button class="tool-btn" onclick="exec('underline')">U</button>
            <button class="tool-btn" onclick="exec('strikeThrough')">S</button>
            <div style="width:1px; background:var(--border); margin: 0 4px;"></div>
            <button class="tool-btn" onclick="exec('formatBlock', 'h1')">H1</button>
            <button class="tool-btn" onclick="exec('formatBlock', 'h2')">H2</button>
            <button class="tool-btn" onclick="exec('formatBlock', 'blockquote')">“</button>
            <button class="tool-btn" onclick="exec('insertUnorderedList')">•</button>
        </div>

        <button class="tool-btn" style="background:var(--accent); color:white; border-radius:10px;" onclick="exportMD()">Export</button>
    </header>

    <div id="editor" contenteditable="true" spellcheck="false"></div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB-6oB6_gM4-HquuHD6XV9dqa0zygQjU34",
        authDomain: "aeropusoffice.firebaseapp.com",
        databaseURL: "https://aeropusoffice-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aeropusoffice",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let currentNoteId = 'default';
    const editor = document.getElementById('editor');
    const filenameInput = document.getElementById('filename');

    function exec(cmd, val = null) {
        document.execCommand(cmd, false, val);
        editor.focus();
    }

    function createNewNote() {
        const name = prompt("Name der Notiz:");
        if(name) {
            currentNoteId = name.replace(/\s+/g, '_');
            filenameInput.value = currentNoteId;
            editor.innerHTML = "<h1>" + name + "</h1><p>Starte hier...</p>";
            saveNote();
        }
    }

    auth.onAuthStateChanged(user => {
        if (!user) window.location.href = "/auth/?redirect=aeronotes";
        
        const cloudRef = db.ref(`users/${user.uid}/aeroCloud`);

        // Liste live laden
        cloudRef.on('value', snap => {
            const list = document.getElementById('note-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const div = document.createElement('div');
                div.className = `note-item ${child.key === currentNoteId ? 'active' : ''}`;
                div.innerHTML = `<span>📄</span> ${child.key}.md`;
                div.onclick = () => loadNote(child.key);
                list.appendChild(div);
            });
        });

        window.loadNote = (id) => {
            currentNoteId = id;
            filenameInput.value = id;
            cloudRef.child(id).once('value').then(snap => {
                editor.innerHTML = snap.val() ? snap.val().html : "<h1>Neue Notiz</h1>";
            });
        };

        window.saveNote = () => {
            cloudRef.child(currentNoteId).set({
                html: editor.innerHTML,
                lastUpdate: Date.now()
            });
        };

        let timeout;
        editor.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(saveNote, 1000);
        });
    });

    function exportMD() {
        const blob = new Blob([editor.innerText], {type: 'text/markdown'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filenameInput.value + ".md";
        a.click();
    }
</script>
</body>
</html>
